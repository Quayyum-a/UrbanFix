<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#031636;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2B4C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with subtle rounding -->
  <rect width="512" height="512" rx="48" fill="url(#faviconBg)"/>
  
  <!-- Simplified shield + wrench for small sizes -->
  <!-- Shield outline -->
  <path d="M 256 100 
           C 256 100, 380 120, 380 120
           C 390 122, 395 127, 395 137
           L 395 280
           C 395 380, 330 440, 256 480
           C 182 440, 117 380, 117 280
           L 117 137
           C 117 127, 122 122, 132 120
           C 132 120, 256 100, 256 100 Z"
        fill="white"/>
  
  <!-- Wrench silhouette (simplified for small size) -->
  <g transform="translate(256, 270)">
    <rect x="-18" y="-90" width="36" height="130" rx="6" fill="#031636"/>
    <!-- Wrench head -->
    <rect x="-28" y="-90" width="20" height="35" fill="#031636"/>
    <rect x="8" y="-90" width="20" height="35" fill="#031636"/>
    <!-- Holes -->
    <circle cx="0" cy="-50" r="8" fill="white"/>
    <circle cx="0" cy="0" r="8" fill="white"/>
  </g>
  
  <!-- Small trust checkmark -->
  <circle cx="370" cy="370" r="35" fill="#2ECC71"/>
  <path d="M 355 370 L 365 380 L 385 360" 
        fill="none" 
        stroke="white" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>